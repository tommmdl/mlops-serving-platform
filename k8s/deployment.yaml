apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-serving
  labels:
    app: mlops-serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mlops-serving
  template:
    metadata:
      labels:
        app: mlops-serving
    spec:
      containers:
        - name: api
          image: ${ECR_REGISTRY}/mlops-serving:${IMAGE_TAG}
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
